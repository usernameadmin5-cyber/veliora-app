# Automatically set Connection header: "upgrade" for WebSocket, "close" for everything else
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

upstream backend {
    server backend:3001;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 8080;

    # Pass real client IP through
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

    # Required for ngrok — forward the original host header so OAuth redirects work
    proxy_set_header X-Forwarded-Host  $http_host;

    # Bypass ngrok browser warning interstitial
    add_header ngrok-skip-browser-warning "true";

    # ── Backend routes ──────────────────────────────────────────────────────
    # API endpoints
    location /v1/ {
        proxy_pass http://backend;
        proxy_read_timeout 120s;
    }

    # Swagger UI
    location /docs {
        proxy_pass http://backend;
    }

    # Uploaded files (avatars, etc.)
    location /uploads/ {
        proxy_pass http://backend;
    }

    # ── Frontend — everything else ──────────────────────────────────────────
    location / {
        proxy_pass http://frontend;

        # Required for Next.js hot-reload WebSocket (dev) — harmless in prod
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
    }
}
